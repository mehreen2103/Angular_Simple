<div align="center">

    <h1>Login</h1>

    <h3 style="color: green;">{{form.message}}</h3>
    <h3 style="color: red;">{{form.errorMessage}}</h3>

    <form (submit)="signIn()">

        <table>
            <tr>
                <th>LoginId</th>
                <td><input type="text" name="loginId" [(ngModel)]="form.data.loginId" placeholder="enter login ID"></td>
                <td style="color: red;">{{form.inputerror.loginId}}</td>
            </tr>
            <tr>
                <th>Password</th>
                <td><input type="password" name="password" [(ngModel)]="form.data.password"
                        placeholder="enter password"></td>
                <td style="color: red;">{{form.inputerror.password}}</td>
            </tr>
            <tr>
                <th></th>
                <td><input type="submit" value="SignIn"></td>
            </tr>
        </table>

    </form>

</div>
